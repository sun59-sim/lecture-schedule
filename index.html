<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 스케줄 관리</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f6f8}
:root{--blue:#185FA5;--blue-lt:#E6F1FB;--blue-dk:#0C447C;--green:#3B6D11;--green-lt:#EAF3DE;--amber:#854F0B;--amber-lt:#FAEEDA;--red:#A32D2D;--red-lt:#FCEBEB;--gray:#5F5E5A;--gray-lt:#F1EFE8;--border:#e2e2e2;--radius:8px;--radius-lg:12px}
.app{display:flex;min-height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.sidebar-logo{font-size:15px;font-weight:700;color:var(--blue);padding:0 1.25rem 1.25rem;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.sidebar-logo span{display:block;font-size:11px;font-weight:400;color:var(--gray);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 1.25rem;font-size:13px;color:var(--gray);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#f5f6f8;color:#1a1a1a}
.nav-item.active{background:var(--blue-lt);color:var(--blue-dk);border-left-color:var(--blue);font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center}
.main{flex:1;padding:1.5rem;overflow-x:auto}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.page-title{font-size:18px;font-weight:700;color:#1a1a1a}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem}
.stat-label{font-size:11px;color:var(--gray);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700}
.stat-value.blue{color:var(--blue)}.stat-value.green{color:var(--green)}.stat-value.amber{color:var(--amber)}.stat-value.red{color:var(--red)}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--gray);transition:all .15s}
.filter-btn:hover{border-color:var(--blue);color:var(--blue)}
.filter-btn.active{background:var(--blue-lt);color:var(--blue-dk);border-color:var(--blue);font-weight:600}
.ml-auto{margin-left:auto}
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse;min-width:860px}
thead tr{background:#f8f9fb}
th{padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:var(--gray);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.b-pub{background:var(--blue-lt);color:var(--blue-dk)}.b-prv{background:var(--amber-lt);color:var(--amber)}
.b-edu{background:var(--green-lt);color:var(--green)}.b-etc{background:var(--gray-lt);color:var(--gray)}
.b-paid{background:var(--green-lt);color:var(--green)}.b-part{background:var(--amber-lt);color:var(--amber)}.b-unpaid{background:var(--red-lt);color:var(--red)}
.b-sent{background:var(--blue-lt);color:var(--blue-dk)}.b-pending{background:var(--amber-lt);color:var(--amber)}.b-confirm{background:var(--green-lt);color:var(--green)}.b-reject{background:var(--red-lt);color:var(--red)}
.b-auto{background:#f0e6fb;color:#5b21b6;font-size:10px;padding:1px 6px}
.btn{padding:7px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid var(--border);background:#fff;color:#1a1a1a;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:#f5f6f8}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.primary:hover{background:var(--blue-dk)}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.icon-btn{border:none;background:none;cursor:pointer;padding:4px 6px;border-radius:4px;color:var(--gray);font-size:15px;line-height:1}
.icon-btn:hover{opacity:.7}
select.inline{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);padding:1.5rem;width:580px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;color:var(--gray);font-weight:600}
.form-group input,.form-group select,.form-group textarea{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:#1a1a1a;width:100%}
.form-group textarea{resize:vertical;min-height:70px}
.sec-divider{grid-column:1/-1;font-size:12px;font-weight:700;color:var(--blue);padding:.5rem 0 .25rem;border-bottom:1px solid var(--blue-lt);margin-top:.25rem}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.dur-display{background:#f5f6f8;padding:7px 10px;border-radius:var(--radius);font-size:13px;color:var(--gray);border:1px solid var(--border)}
/* calendar */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.cal-nav h3{font-size:16px;font-weight:700;min-width:120px;text-align:center}
.cal-grid{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-head div{text-align:center;padding:8px;font-size:12px;font-weight:700;background:#f8f9fb;border-bottom:1px solid var(--border);color:var(--gray)}
.cal-head div:first-child{color:#c0392b}.cal-head div:last-child{color:#2980b9}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month .cal-day{color:#ccc}
.cal-cell.today{background:#fffbea}
.cal-cell.today .cal-day{background:var(--blue);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-day{font-size:12px;font-weight:600;margin-bottom:4px;color:#1a1a1a}
.cal-cell:nth-child(7n+1) .cal-day{color:#c0392b}
.cal-cell:nth-child(7n) .cal-day{color:#2980b9}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.4}
.cal-event.pub{background:var(--blue-lt);color:var(--blue-dk)}.cal-event.prv{background:var(--amber-lt);color:var(--amber)}
.cal-event.edu{background:var(--green-lt);color:var(--green)}.cal-event.etc{background:var(--gray-lt);color:var(--gray)}
/* proposal */
.prop-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1rem}
.prop-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.prop-card.confirmed{border-color:#3B6D11;border-width:2px}
.prop-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.prop-card-title{font-size:14px;font-weight:700;line-height:1.3}
.prop-card-meta{font-size:12px;color:var(--gray);margin-top:4px;line-height:1.6}
.prop-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.empty{text-align:center;padding:3rem;color:var(--gray);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:.5rem}
.confirm-box{background:var(--green-lt);border:1px solid #b7e0a0;border-radius:var(--radius);padding:8px 10px;margin-top:8px;font-size:12px;color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">📋 강의 관리<span>Vibe Coding 강사용</span></div>
    <div class="nav-item active" onclick="showPage('schedule',this)"><span class="nav-icon">📅</span>스케줄 목록</div>
    <div class="nav-item" onclick="showPage('calendar',this)"><span class="nav-icon">🗓️</span>월별 달력</div>
    <div class="nav-item" onclick="showPage('proposal',this)"><span class="nav-icon">📨</span>제안서 발송</div>
  </aside>

  <main class="main">
    <!-- 스케줄 목록 -->
    <div class="page active" id="page-schedule">
      <div class="page-header">
        <div class="page-title">강의 스케줄 목록</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn success" onclick="exportXlsx()">⬇ 엑셀 내보내기</button>
          <button class="btn primary" onclick="openLecModal()">＋ 강의 추가</button>
        </div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <span style="font-size:12px;color:var(--gray)">교육처 유형:</span>
        <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
        <button class="filter-btn" onclick="setFilter('공공기관',this)">공공기관</button>
        <button class="filter-btn" onclick="setFilter('민간기관',this)">민간기관</button>
        <button class="filter-btn" onclick="setFilter('교육기관',this)">교육기관</button>
        <button class="filter-btn" onclick="setFilter('기타',this)">기타</button>
        <select class="inline ml-auto" onchange="sortBy=this.value;renderTable()">
          <option value="date">날짜순</option>
          <option value="fee">강의료순</option>
          <option value="org">교육처순</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>강좌명</th><th>교육처</th><th>유형</th><th>일자·요일</th>
            <th>강의 시간</th><th>수강 인원</th><th>강의료</th><th>입금</th><th></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 월별 달력 -->
    <div class="page" id="page-calendar">
      <div class="page-header"><div class="page-title">월별 달력</div></div>
      <div class="cal-nav">
        <button class="btn" onclick="changeMonth(-1)">◀ 이전</button>
        <h3 id="cal-title"></h3>
        <button class="btn" onclick="changeMonth(1)">다음 ▶</button>
        <button class="btn ml-auto" onclick="goToday()">오늘</button>
      </div>
      <div class="cal-grid">
        <div class="cal-head">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div class="cal-body" id="cal-body"></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:.75rem;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--gray)">범례:</span>
        <span class="badge b-pub">공공기관</span>
        <span class="badge b-prv">민간기관</span>
        <span class="badge b-edu">교육기관</span>
        <span class="badge b-etc">기타</span>
      </div>
    </div>

    <!-- 제안서 발송 -->
    <div class="page" id="page-proposal">
      <div class="page-header">
        <div class="page-title">제안서 발송 기록</div>
        <button class="btn primary" onclick="openPropModal()">＋ 발송 기록 추가</button>
      </div>
      <div class="stats" id="prop-stats"></div>
      <div class="toolbar">
        <span style="font-size:12px;color:var(--gray)">상태:</span>
        <button class="filter-btn active" onclick="setPropFilter('all',this)">전체</button>
        <button class="filter-btn" onclick="setPropFilter('발송완료',this)">발송완료</button>
        <button class="filter-btn" onclick="setPropFilter('검토중',this)">검토중</button>
        <button class="filter-btn" onclick="setPropFilter('확정',this)">확정</button>
        <button class="filter-btn" onclick="setPropFilter('거절',this)">거절</button>
      </div>
      <div class="prop-cards" id="prop-cards"></div>
    </div>
  </main>
</div>

<!-- 강의 모달 -->
<div class="overlay" id="lec-modal">
  <div class="modal">
    <div class="modal-title" id="lec-modal-title">강의 추가</div>
    <div class="form-grid">
      <div class="form-group full"><label>강좌명</label><input id="f-name" placeholder="예: Vibe Coding 기초 과정"></div>
      <div class="form-group"><label>교육(수요)처명</label><input id="f-org" placeholder="예: 서울시청"></div>
      <div class="form-group"><label>교육처 유형</label>
        <select id="f-type"><option>공공기관</option><option>민간기관</option><option>교육기관</option><option>기타</option></select>
      </div>
      <div class="form-group"><label>강의 날짜</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>비고</label><input id="f-note" placeholder="예: 격주 수요일, 총 6회"></div>
      <div class="sec-divider">⏱ 강의 시간</div>
      <div class="form-group"><label>시작 시간</label><input type="time" id="f-start" value="10:00" oninput="calcDur()"></div>
      <div class="form-group"><label>종료 시간</label><input type="time" id="f-end" value="11:30" oninput="calcDur()"></div>
      <div class="form-group full"><label>소요시간</label><div class="dur-display" id="f-dur">90분</div></div>
      <div class="sec-divider">👥 수강 인원</div>
      <div class="form-group"><label>수강 신청 인원 (명)</label><input type="number" id="f-reg" placeholder="0" min="0"></div>
      <div class="form-group"><label>수강 완료 인원 (명)</label><input type="number" id="f-comp" placeholder="0" min="0"></div>
      <div class="sec-divider">💰 강의료</div>
      <div class="form-group"><label>강의료 (원)</label><input type="number" id="f-fee" placeholder="예: 300000" min="0"></div>
      <div class="form-group"><label>입금 여부</label>
        <select id="f-paid"><option>미입금</option><option>입금완료</option><option>일부입금</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeLecModal()">취소</button>
      <button class="btn primary" onclick="saveLec()">저장</button>
    </div>
  </div>
</div>

<!-- 제안서 모달 -->
<div class="overlay" id="prop-modal">
  <div class="modal">
    <div class="modal-title" id="prop-modal-title">제안서 발송 기록 추가</div>
    <div class="form-grid">
      <div class="form-group full"><label>제안 강좌명</label><input id="p-name" placeholder="예: AI 활용 실무 교육"></div>
      <div class="form-group"><label>교육(수요)처명</label><input id="p-org" placeholder="예: 강남구청"></div>
      <div class="form-group"><label>교육처 유형</label>
        <select id="p-type"><option>공공기관</option><option>민간기관</option><option>교육기관</option><option>기타</option></select>
      </div>
      <div class="form-group"><label>담당자명</label><input id="p-contact" placeholder="예: 홍길동 팀장"></div>
      <div class="form-group"><label>담당자 연락처</label><input id="p-tel" placeholder="예: 010-1234-5678"></div>
      <div class="form-group"><label>발송 일자</label><input type="date" id="p-date"></div>
      <div class="form-group"><label>진행 상태</label>
        <select id="p-status"><option>발송완료</option><option>검토중</option><option>확정</option><option>거절</option></select>
      </div>
      <div class="form-group"><label>제안 강의료 (원)</label><input type="number" id="p-fee" placeholder="예: 500000" min="0"></div>
      <div class="form-group"><label>희망 교육 일정</label><input id="p-schedule" placeholder="예: 7월 중 2회"></div>
      <div class="sec-divider">✅ 확정 시 스케줄 자동 등록 정보</div>
      <div class="form-group"><label>확정 강의 날짜</label><input type="date" id="p-confirm-date"></div>
      <div class="form-group"><label>확정 시작시간</label><input type="time" id="p-confirm-start" value="10:00"></div>
      <div class="form-group full"><label>메모</label><textarea id="p-memo" placeholder="추가 내용, 후속 액션 등"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closePropModal()">취소</button>
      <button class="btn primary" onclick="saveProp()">저장</button>
    </div>
  </div>
</div>

<script>
const DAYS=['일','월','화','수','목','금','토'];

/* 로컬 날짜 문자열 반환 (YYYY-MM-DD) - toISOString() 시간대 버그 방지 */
function localDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr(){return localDateStr(new Date())}

let lectures  = JSON.parse(localStorage.getItem('lec_v3')||'[]');
let proposals = JSON.parse(localStorage.getItem('prop_v3')||'[]');
let lecEditId=null, propEditId=null;
let filterType='all', sortBy='date', propFilterStatus='all';
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function save(){
  localStorage.setItem('lec_v3',JSON.stringify(lectures));
  localStorage.setItem('prop_v3',JSON.stringify(proposals));
}

/* helpers */
function dayKor(d){if(!d)return'';return DAYS[new Date(d+'T00:00:00').getDay()]+'요일'}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');return y+'.'+m+'.'+dd}
function getDur(s,e){
  if(!s||!e)return'';
  const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  const diff=(eh*60+em)-(sh*60+sm);
  return diff>0?diff+'분':'';
}
function fmtMoney(n){return n?Number(n).toLocaleString('ko-KR')+'원':'—'}
function typeCls(t){return{공공기관:'pub',민간기관:'prv',교육기관:'edu',기타:'etc'}[t]||'etc'}
function typeBadge(t){return'<span class="badge b-'+typeCls(t)+'">'+t+'</span>'}
function paidBadge(p){const c=p==='입금완료'?'paid':p==='일부입금'?'part':'unpaid';return'<span class="badge b-'+c+'">'+p+'</span>'}
function statusBadge(s){const c={발송완료:'sent',검토중:'pending',확정:'confirm',거절:'reject'}[s]||'sent';return'<span class="badge b-'+c+'">'+s+'</span>'}

/* nav */
function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='calendar')renderCal();
  if(id==='proposal'){renderPropStats();renderPropCards();}
}

/* ── 강의 모달 ── */
function openLecModal(id){
  lecEditId=id||null;
  document.getElementById('lec-modal-title').textContent=id?'강의 수정':'강의 추가';
  const r=id?lectures.find(x=>x.id===id):{};
  document.getElementById('f-name').value=r.name||'';
  document.getElementById('f-org').value=r.org||'';

/* ── 엑셀 내보내기 ── */
function exportXlsx(){
  if(!lectures.length){alert('내보낼 데이터가 없어요.');return}

  /* CSV 생성 함수 */
  function makeCSV(headers, rows){
    const esc=v=>{
      const s=String(v==null?'':v);
      return (s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;
    };
    return [headers.map(esc).join(','),
      ...rows.map(r=>headers.map(h=>esc(r[h]||'')).join(','))
    ].join('\r\n');
  }

  /* 강의 스케줄 CSV */
  const lecHeaders=['강좌명','교육처','교육처유형','강의날짜','요일','시작시간','종료시간','소요시간(분)','수강신청인원','수강완료인원','강의료(원)','입금여부','비고'];
  const lecRows=lectures.map(r=>({
    '강좌명':r.name||'','교육처':r.org||'','교육처유형':r.orgType||'',
    '강의날짜':r.date||'','요일':r.date?DAYS[new Date(r.date+'T00:00:00').getDay()]+'요일':'',
    '시작시간':r.startTime||'','종료시간':r.endTime||'',
    '소요시간(분)':getDur(r.startTime,r.endTime).replace('분','')||'',
    '수강신청인원':r.regCount||0,'수강완료인원':r.compCount||0,
    '강의료(원)':r.fee||0,'입금여부':r.paid||'미입금','비고':r.note||''
  }));

  /* 제안서 CSV */
  const propHeaders=['제안강좌명','교육처','교육처유형','담당자','연락처','발송일자','진행상태','제안강의료(원)','희망일정','확정날짜','메모'];
  const propRows=proposals.map(p=>({
    '제안강좌명':p.name||'','교육처':p.org||'','교육처유형':p.orgType||'',
    '담당자':p.contact||'','연락처':p.tel||'','발송일자':p.date||'',
    '진행상태':p.status||'','제안강의료(원)':p.fee||0,
    '희망일정':p.schedule||'','확정날짜':p.confirmDate||'','메모':p.memo||''
  }));

  /* BOM 포함 UTF-8 — 엑셀에서 한글 깨짐 방지 */
  function download(filename, csvContent){
    const BOM='\uFEFF';
    const blob=new Blob([BOM+csvContent],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},200);
  }

  download('강의스케줄_'+todayStr()+'.csv', makeCSV(lecHeaders, lecRows));
  if(proposals.length){
    setTimeout(()=>download('제안서발송_'+todayStr()+'.csv', makeCSV(propHeaders, propRows)), 500);
  }
  alert('다운로드 시작! 파일을 엑셀로 열어주세요.\n(강의스케줄.csv + 제안서발송.csv)');
}

/* ── 달력 ── */
function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  renderCal();
}
function goToday(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCal()}
function renderCal(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent=calYear+'년 '+months[calMonth];
  const today=todayStr();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  let cells=[];
  // 이전 달
  for(let i=firstDay-1;i>=0;i--){
    const d=new Date(calYear,calMonth,-i);
    cells.push({date:d,cur:false});
  }
  // 이번 달
  for(let d=1;d<=lastDate;d++) cells.push({date:new Date(calYear,calMonth,d),cur:true});
  // 다음 달
  const rem=7-cells.length%7;
  if(rem<7)for(let i=1;i<=rem;i++) cells.push({date:new Date(calYear,calMonth+1,i),cur:false});

  document.getElementById('cal-body').innerHTML=cells.map(function(c){
    const ds=localDateStr(c.date);            /* ← 핵심: 로컬 날짜 문자열 */
    const isToday=ds===today;
    /* 강의 이벤트 */
    const evts=lectures.filter(r=>r.date===ds);
    const evtHtml=evts.map(r=>
      '<div class="cal-event '+typeCls(r.orgType)+'" onclick="openLecModal(\''+r.id+'\')" title="'+r.name+' | '+(r.startTime||'')+'~'+(r.endTime||'')+'">'+
      (r.startTime?r.startTime+' ':'')+r.name+'</div>'
    ).join('');
    return '<div class="cal-cell '+(c.cur?'':'other-month ')+' '+(isToday?'today':'')+'">'+
      '<div class="cal-day">'+c.date.getDate()+'</div>'+
      evtHtml+'</div>';
  }).join('');
}

/* 제안서 → 스케줄 자동 등록 핵심 함수 */
function autoRegister(p){
  if(!p.confirmDate){
    alert('확정 강의 날짜가 없어요.\n제안서 수정(✏️)에서 "확정 강의 날짜"를 입력한 뒤 다시 확정으로 바꿔주세요.');
    return;
  }
  const srcId='prop_'+p.id;
  const existing=lectures.find(l=>l.srcId===srcId);
  if(existing){
    // 이미 등록된 경우: 날짜/시간만 업데이트
    existing.date=p.confirmDate;
    existing.startTime=p.confirmStart||'10:00';
    existing.name=p.name;
    existing.org=p.org;
    existing.orgType=p.orgType;
    existing.fee=p.fee||0;
  } else {
    // 새로 등록
    lectures.push({
      id:'lec_'+Date.now(),
      srcId:srcId,
      name:p.name||'',
      org:p.org||'',
      orgType:p.orgType||'공공기관',
      date:p.confirmDate,
      note:'📨 제안서 확정 자동등록',
      startTime:p.confirmStart||'10:00',
      endTime:'',
      regCount:0, compCount:0,
      fee:p.fee||0,
      paid:'미입금',
    });
    alert('✅ "'+p.name+'" 강의가 스케줄 목록에 자동 등록되었어요!\n\n날짜: '+fmtDate(p.confirmDate)+'\n\n스케줄 목록에서 종료시간, 수강인원 등을 추가 입력해 주세요.');
  }
}
